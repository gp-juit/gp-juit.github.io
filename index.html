<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gurpreet Singh — iOS & Flutter Engineer</title>
  <meta name="description" content="iOS & Flutter Engineer with 4+ years building high-performance apps. Swift, SwiftUI, Dart, real-time systems, product thinking.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #07071A;
      --surface: #0D0D24;
      --surface-2: #13132E;
      --surface-3: #1A1A38;
      --border: rgba(255,255,255,0.06);
      --border-strong: rgba(255,255,255,0.12);
      --text: #F0EFF8;
      --text-2: #8A88A8;
      --text-3: #4E4C6A;
      --accent: #7B79F5;
      --accent-dim: rgba(123,121,245,0.12);
      --accent-glow: rgba(123,121,245,0.3);
      --green: #4ADE80;
      --green-dim: rgba(74,222,128,0.1);
      --font-head: 'Outfit', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    #root { min-height: 100vh; }

    .container { max-width: 1100px; margin: 0 auto; padding: 0 2rem; }

    .section { padding: 120px 0; }

    .section-label {
      font-family: var(--font-head);
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.75rem;
    }

    .section-title {
      font-family: var(--font-head);
      font-size: clamp(2rem, 4vw, 2.75rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.1;
      color: var(--text);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.3rem 0.85rem;
      background: var(--accent-dim);
      border: 1px solid rgba(123,121,245,0.25);
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--accent);
      font-family: var(--font-head);
      letter-spacing: 0.01em;
    }

    .pill-green {
      background: var(--green-dim);
      border-color: rgba(74,222,128,0.2);
      color: var(--green);
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.72rem 1.6rem;
      background: var(--accent);
      color: white;
      border-radius: 100px;
      font-family: var(--font-head);
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      border: none;
      letter-spacing: 0.01em;
    }

    .btn-primary:hover {
      background: #9290F8;
      transform: translateY(-2px);
      box-shadow: 0 10px 30px var(--accent-glow);
    }

    .btn-ghost {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.72rem 1.6rem;
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border-strong);
      border-radius: 100px;
      font-family: var(--font-head);
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      cursor: pointer;
      letter-spacing: 0.01em;
    }

    .btn-ghost:hover {
      background: var(--surface-2);
      border-color: rgba(255,255,255,0.2);
      transform: translateY(-1px);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      transition: border-color 0.25s, transform 0.25s, box-shadow 0.25s;
    }

    .card:hover {
      border-color: var(--border-strong);
      transform: translateY(-3px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .tag {
      display: inline-flex;
      padding: 0.22rem 0.6rem;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-2);
      font-family: var(--font-head);
      letter-spacing: 0.01em;
    }

    .reveal {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.75s cubic-bezier(0.16,1,0.3,1), transform 0.75s cubic-bezier(0.16,1,0.3,1);
    }

    .revealed { opacity: 1; transform: none; }

    @keyframes floatA {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-20px, -35px) scale(1.04); }
    }
    @keyframes floatB {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(25px, 20px) scale(0.96); }
    }
    @keyframes floatC {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-10px, 15px) scale(1.06); }
    }
    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .img-placeholder {
      background-color: var(--surface-2);
      background-image: repeating-linear-gradient(
        135deg, transparent, transparent 12px,
        rgba(255,255,255,0.018) 12px, rgba(255,255,255,0.018) 24px
      );
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: monospace;
      font-size: 0.68rem;
      color: var(--text-3);
      text-align: center;
      padding: 1rem;
      letter-spacing: 0.03em;
    }

    .divider { height: 1px; background: var(--border); }

    .case-study-wrap {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.45s cubic-bezier(0.16,1,0.3,1);
    }
    .case-study-wrap.open { grid-template-rows: 1fr; }
    .case-study-inner { overflow: hidden; }

    a { color: inherit; text-decoration: none; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 3px; }

    @media (max-width: 768px) {
      .section { padding: 80px 0; }
      .container { padding: 0 1.25rem; }
    }

    @media (max-width: 640px) {
      .nav-links { display: none !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ── shared ── */
    const useReveal = (threshold = 0.1) => {
      const ref = useRef(null);
      const [visible, setVisible] = useState(false);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver(
          ([e]) => { if (e.isIntersecting) setVisible(true); },
          { threshold }
        );
        obs.observe(el);
        return () => obs.disconnect();
      }, []);
      return [ref, visible];
    };

    const Section = ({ id, children, style = {} }) => (
      <section id={id} className="section" style={style}>
        <div className="container">{children}</div>
      </section>
    );

    const SectionHeader = ({ label, title, subtitle, visible, delay = 0 }) => (
      <div className={`reveal ${visible ? 'revealed' : ''}`}
        style={{ transitionDelay: `${delay}s` }}>
        {label && <p className="section-label">{label}</p>}
        <h2 className="section-title">{title}</h2>
        {subtitle && (
          <p style={{ color: 'var(--text-2)', marginTop: '0.75rem', fontSize: '1.05rem', maxWidth: '540px', lineHeight: 1.7 }}>
            {subtitle}
          </p>
        )}
      </div>
    );

    const ImgPlaceholder = ({ height = 220, label = 'app screen', style = {}, borderRadius = 0 }) => (
      <div className="img-placeholder" style={{ height, borderRadius, ...style }}>
        {label}
      </div>
    );

    /* ── Nav ── */
    const Nav = () => {
      const [scrolled, setScrolled] = useState(false);

      useEffect(() => {
        const onScroll = () => setScrolled(window.scrollY > 60);
        window.addEventListener('scroll', onScroll);
        return () => window.removeEventListener('scroll', onScroll);
      }, []);

      const links = [
        { label: 'Work', href: '#projects' },
        { label: 'Experience', href: '#experience' },
        { label: 'Thinking', href: '#engineering' },
        { label: 'Contact', href: '#contact' },
      ];

      const navStyle = {
        position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100,
        padding: '0',
        transition: 'background 0.3s, border-color 0.3s, backdrop-filter 0.3s',
        background: scrolled ? 'rgba(7,7,26,0.85)' : 'transparent',
        backdropFilter: scrolled ? 'blur(20px)' : 'none',
        borderBottom: scrolled ? '1px solid rgba(255,255,255,0.06)' : '1px solid transparent',
      };

      const innerStyle = {
        maxWidth: 1100, margin: '0 auto', padding: '0 2rem',
        height: 64, display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      };

      const logoStyle = {
        fontFamily: 'var(--font-head)', fontWeight: 800, fontSize: '1.1rem',
        letterSpacing: '-0.02em', color: 'var(--text)',
        display: 'flex', alignItems: 'center', gap: '0.5rem',
      };

      return (
        <nav style={navStyle}>
          <div style={innerStyle}>
            <a href="#hero" style={logoStyle}>
              <span style={{
                width: 30, height: 30, borderRadius: 8,
                background: 'var(--accent)', display: 'flex', alignItems: 'center',
                justifyContent: 'center', fontSize: '0.85rem', fontWeight: 800, color: 'white',
              }}>GS</span>
              <span>Gurpreet Singh</span>
            </a>

            <div style={{ display: 'flex', alignItems: 'center', gap: '2rem' }} className="nav-links">
              {links.map(l => (
                <a key={l.label} href={l.href} style={{
                  fontFamily: 'var(--font-head)', fontSize: '0.88rem', fontWeight: 500,
                  color: 'var(--text-2)', transition: 'color 0.2s', letterSpacing: '0.01em',
                }}
                  onMouseEnter={e => e.target.style.color = 'var(--text)'}
                  onMouseLeave={e => e.target.style.color = 'var(--text-2)'}
                >{l.label}</a>
              ))}
              <span className="pill pill-green" style={{ fontSize: '0.7rem' }}>
                <span style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--green)', display: 'inline-block' }}></span>
                Open to work
              </span>
            </div>
          </div>
        </nav>
      );
    };

    /* ── Hero ── */
    const Hero = () => {
      const [visible, setVisible] = useState(false);

      useEffect(() => {
        const t = setTimeout(() => setVisible(true), 120);
        return () => clearTimeout(t);
      }, []);

      const headline = ['Building mobile', 'experiences that', 'feel inevitable.'];
      const spring = 'cubic-bezier(0.16,1,0.3,1)';

      return (
        <section id="hero" style={{ position: 'relative', minHeight: '100vh', display: 'flex', alignItems: 'center', overflow: 'hidden', paddingTop: 80 }}>
          <div style={{ position: 'absolute', inset: 0, pointerEvents: 'none', zIndex: 0 }}>
            <div style={{
              position: 'absolute', top: '10%', right: '5%',
              width: 500, height: 500, borderRadius: '50%',
              background: 'radial-gradient(circle, rgba(123,121,245,0.18) 0%, transparent 70%)',
              animation: 'floatA 10s ease-in-out infinite',
            }} />
            <div style={{
              position: 'absolute', bottom: '15%', left: '-5%',
              width: 400, height: 400, borderRadius: '50%',
              background: 'radial-gradient(circle, rgba(99,91,255,0.12) 0%, transparent 70%)',
              animation: 'floatB 13s ease-in-out infinite',
            }} />
            <div style={{
              position: 'absolute', top: '50%', left: '40%',
              width: 300, height: 300, borderRadius: '50%',
              background: 'radial-gradient(circle, rgba(74,222,128,0.06) 0%, transparent 70%)',
              animation: 'floatC 9s ease-in-out infinite',
            }} />
            <div style={{
              position: 'absolute', inset: 0,
              backgroundImage: 'linear-gradient(rgba(255,255,255,0.022) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px)',
              backgroundSize: '60px 60px',
              maskImage: 'radial-gradient(ellipse 80% 60% at 50% 40%, black 0%, transparent 100%)',
            }} />
          </div>

          <div className="container" style={{ position: 'relative', zIndex: 1 }}>
            <div style={{
              opacity: visible ? 1 : 0, transform: visible ? 'none' : 'translateY(12px)',
              transition: `opacity 0.6s ${spring}, transform 0.6s ${spring}`,
              marginBottom: '2rem',
            }}>
              <span className="pill">
                <span style={{ width: 7, height: 7, borderRadius: '50%', background: 'var(--accent)', display: 'inline-block', boxShadow: '0 0 6px var(--accent)' }}></span>
                iOS & Flutter Engineer · Swift · SwiftUI · Dart · 4+ Years
              </span>
            </div>

            <h1 style={{
              fontFamily: 'var(--font-head)', fontWeight: 900,
              fontSize: 'clamp(3rem, 8vw, 6.5rem)',
              letterSpacing: '-0.04em', lineHeight: 1.02, marginBottom: '2rem',
            }}>
              {headline.map((line, i) => (
                <span key={i} style={{ display: 'block', overflow: 'hidden' }}>
                  <span style={{
                    display: 'block',
                    opacity: visible ? 1 : 0,
                    transform: visible ? 'none' : 'translateY(40px)',
                    transition: `opacity 0.8s ${0.15 + i * 0.1}s ${spring}, transform 0.8s ${0.15 + i * 0.1}s ${spring}`,
                  }}>
                    {i === 2 ? (
                      <span style={{
                        background: 'linear-gradient(135deg, #7B79F5 0%, #B8B6FF 50%, #7B79F5 100%)',
                        backgroundSize: '200% auto',
                        WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent',
                        animation: 'gradientShift 4s ease infinite',
                      }}>{line}</span>
                    ) : line}
                  </span>
                </span>
              ))}
            </h1>

            <p style={{
              fontSize: 'clamp(1rem, 2vw, 1.2rem)', color: 'var(--text-2)',
              maxWidth: 580, lineHeight: 1.7, marginBottom: '2.5rem',
              opacity: visible ? 1 : 0, transform: visible ? 'none' : 'translateY(20px)',
              transition: `opacity 0.8s 0.5s ${spring}, transform 0.8s 0.5s ${spring}`,
            }}>
              I build apps that people actually want to use. iOS with Swift and SwiftUI, cross-platform with Flutter — from real-time delivery tracking to mental health tools, I care about the craft, the performance, and the person on the other end of the screen.
            </p>

            <div style={{
              display: 'flex', gap: '0.85rem', flexWrap: 'wrap',
              opacity: visible ? 1 : 0, transform: visible ? 'none' : 'translateY(20px)',
              transition: `opacity 0.8s 0.65s ${spring}, transform 0.8s 0.65s ${spring}`,
            }}>
              <a href="#projects" className="btn-primary">View Work</a>
              <a href="#contact" className="btn-ghost">Get in Touch</a>
              <a href="https://drive.google.com/file/d/1YBb6pn2k1xuyAGaAOxZpccuIfwhP9eaJ/view?usp=drive_link" target="_blank" rel="noreferrer" className="btn-ghost" style={{ color: 'var(--text-2)' }}>
                Resume ↗
              </a>
            </div>

            <div style={{
              position: 'absolute', bottom: -120, left: 0,
              opacity: visible ? 0.4 : 0,
              transition: `opacity 1s 1.2s`,
              display: 'flex', alignItems: 'center', gap: '0.75rem',
            }}>
              <div style={{
                width: 1, height: 60,
                background: 'linear-gradient(to bottom, var(--accent), transparent)',
              }} />
              <span style={{ fontFamily: 'var(--font-head)', fontSize: '0.7rem', letterSpacing: '0.12em', color: 'var(--text-3)', textTransform: 'uppercase', writingMode: 'vertical-rl' }}>
                Scroll
              </span>
            </div>
          </div>
        </section>
      );
    };

    /* ── Projects ── */
    const Projects = () => {
      const [ref, visible] = useReveal();
      const [expanded, setExpanded] = useState(null);
      const spring = 'cubic-bezier(0.16,1,0.3,1)';

      const projects = [
        {
          id: 'breatheout',
          label: 'Mental Health · iOS App',
          name: 'BreatheOut',
          tagline: 'The journaling app that listens before it reads.',
          description: 'A privacy-first mental wellness app combining voice journaling, emotion tagging, and haptic-guided breathing — built to feel like a conversation, not a form.',
          features: ['Voice-to-text journaling with real-time transcription', 'Emotion tagging using on-device ML', 'Haptic-synced breathing exercises'],
          tech: ['SwiftUI', 'Speech Framework', 'CoreHaptics', 'CoreML', 'Firebase'],
          problem: 'Mental health apps feel clinical. Users abandon them within days because journaling feels like homework, not relief.',
          solution: 'Voice-first interface removes the barrier of typing. Real-time transcription, smart emotion detection, and haptic breathing patterns create a ritual that feels human.',
          impact: ['Featured on the App Store (Mental Wellness)', '50K+ downloads in first 6 months', '4.8★ average rating · 2.1K reviews', 'Avg. session length 4.2 min (2× industry avg)'],
          accent: '#7B79F5',
          mockLabel: 'BreatheOut — breathing screen + journal entry',
          mockLabel2: 'Voice recording UI · Emotion tagging flow',
        },
        {
          id: 'aromaclub',
          label: 'Community · Flutter App',
          name: 'Aroma Club',
          tagline: 'Where fragrance obsession becomes community.',
          description: 'A social discovery platform for fragrance enthusiasts built in Flutter — real-time feeds, user-generated content, and silky-smooth infinite scroll powered by Firebase.',
          features: ['Real-time social feed with Firebase listeners', 'User-generated reviews & scent profiles', 'Smooth infinite scroll at consistent 60fps in Flutter'],
          tech: ['Flutter', 'Dart', 'Firebase Realtime DB', 'Firestore', 'Provider', 'Riverpod'],
          problem: 'Fragrance is deeply personal but discovered alone. Enthusiasts had no native space to share, review, and discover scents together.',
          solution: 'Built a social layer in Flutter with Firebase real-time listeners for instant feed updates. Custom scroll controller implementation with prefetching eliminated jank entirely.',
          impact: ['Launched to 5K+ waitlist', '60fps scroll on all supported devices', 'Firebase read latency under 120ms avg', 'Day-30 retention 38% (vs 20% benchmark)'],
          accent: '#C084FC',
          mockLabel: 'Aroma Club — discovery feed + fragrance card',
          mockLabel2: 'Profile view · Collection grid · Review composer',
        },
      ];

      return (
        <Section id="projects">
          <div ref={ref}>
            <SectionHeader
              label="Featured Work"
              title="Projects that ship."
              subtitle="Two apps built from scratch — each one a distinct engineering problem with a real product outcome."
              visible={visible}
            />

            <div style={{ marginTop: '4rem', display: 'flex', flexDirection: 'column', gap: '2rem' }}>
              {projects.map((p, i) => (
                <div key={p.id} className="card" style={{
                  opacity: visible ? 1 : 0,
                  transform: visible ? 'none' : 'translateY(32px)',
                  transition: `opacity 0.7s ${0.15 + i * 0.15}s ${spring}, transform 0.7s ${0.15 + i * 0.15}s ${spring}`,
                  borderRadius: 20,
                }}>
                  <div style={{ padding: '2.5rem 2.5rem 0' }}>
                    <div style={{ borderRadius: 12, overflow: 'hidden', marginBottom: '2rem', position: 'relative' }}>
                      <ImgPlaceholder height={300} label={p.mockLabel}
                        style={{ background: `linear-gradient(135deg, ${p.accent}18, var(--surface-2))` }} />
                      <div style={{
                        position: 'absolute', top: 16, left: 16,
                        background: 'rgba(7,7,26,0.8)', backdropFilter: 'blur(12px)',
                        border: '1px solid var(--border-strong)', borderRadius: 8,
                        padding: '0.3rem 0.7rem',
                        fontFamily: 'var(--font-head)', fontSize: '0.72rem', fontWeight: 600,
                        color: 'var(--text-2)', letterSpacing: '0.1em', textTransform: 'uppercase',
                      }}>{p.label}</div>
                    </div>

                    <div style={{ display: 'grid', gridTemplateColumns: '1fr auto', gap: '1.5rem', alignItems: 'start' }}>
                      <div>
                        <h3 style={{ fontFamily: 'var(--font-head)', fontSize: '1.75rem', fontWeight: 800, letterSpacing: '-0.03em', marginBottom: '0.4rem' }}>
                          {p.name}
                        </h3>
                        <p style={{ color: 'var(--text-2)', fontSize: '1.05rem', fontStyle: 'italic', marginBottom: '1rem' }}>{p.tagline}</p>
                        <p style={{ color: 'var(--text-2)', lineHeight: 1.7, fontSize: '0.95rem', maxWidth: 560 }}>{p.description}</p>
                      </div>
                    </div>

                    <div style={{ marginTop: '1.5rem', display: 'flex', flexDirection: 'column', gap: '0.5rem' }}>
                      {p.features.map((f, j) => (
                        <div key={j} style={{ display: 'flex', alignItems: 'center', gap: '0.6rem' }}>
                          <span style={{ width: 5, height: 5, borderRadius: '50%', background: p.accent, flexShrink: 0 }}></span>
                          <span style={{ fontSize: '0.88rem', color: 'var(--text-2)' }}>{f}</span>
                        </div>
                      ))}
                    </div>

                    <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.5rem', marginTop: '1.25rem' }}>
                      {p.tech.map(t => <span key={t} className="tag">{t}</span>)}
                    </div>

                  </div>

                  <div className="case-study-wrap"
                    <div className="case-study-inner">
                      <div style={{ borderTop: '1px solid var(--border)', padding: '2.5rem' }}>
                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap: '1px', background: 'var(--border)', borderRadius: 12, overflow: 'hidden', marginBottom: '2.5rem' }}>
                          {p.impact.map((item, j) => (
                            <div key={j} style={{ background: 'var(--surface-2)', padding: '1.25rem 1.5rem' }}>
                              <span style={{ fontSize: '0.82rem', color: 'var(--text-2)', lineHeight: 1.5, display: 'block' }}>{item}</span>
                            </div>
                          ))}
                        </div>
